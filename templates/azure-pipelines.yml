# Azure Pipelines — Capiva OS Template
# Standalone pipeline: build, test, publish, deploy. No external template dependencies.

trigger:
  branches:
    include:
      - main
      - release/*
      - develop

pr:
  branches:
    include:
      - main
      - release/*
      - feature/*
      - hotfix/*
      - develop

variables:
  - name: DOTNET_VERSION
    value: '10.0.x'
  - name: SONAR_PROJECT_KEY
    value: '[your-service-name]'

stages:
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildAndTest
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET SDK'
            inputs:
              version: $(DOTNET_VERSION)

          - script: dotnet restore
            displayName: 'Restore packages'

          - script: dotnet build --configuration Release --no-restore
            displayName: 'Build'

          - script: dotnet test --configuration Release --no-build --logger trx --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura,opencover
            displayName: 'Run tests'

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '**/*.trx'

          - task: PublishCodeCoverageResults@2
            inputs:
              summaryFileLocation: '**/coverage.cobertura.xml'

          - task: DotNetCoreCLI@2
            displayName: 'Publish application'
            inputs:
              command: 'publish'
              projects: 'src/**/*.csproj'
              arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)/publish'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish artifact'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/publish'
              ArtifactName: 'drop'

