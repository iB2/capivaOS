name: Harness CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint + manifests + release contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # bump_version --check diffs against the last release tag
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Linter self-test (must catch seeded drift)
        run: python scripts/harness_lint.py --self-test
      - name: Lint cross-references, blueprints, acs schemas, manifests
        run: python scripts/harness_lint.py
      - name: Implementation-report validator self-test
        run: python scripts/validate_impl_report.py --self-test
      - name: Release contract check (changelog + migration rows)
        run: python scripts/bump_version.py --check

  plugin-install:
    # Installs the plugin with the REAL Claude Code CLI — the class of failure
    # harness_lint cannot catch (the 1.1.0 release shipped a manifest the CLI
    # 2.1.50 validator rejected; every adopter's first command failed. 2.1.160
    # accepts the same manifest — the validator changed upstream, which is why
    # a schema-shaped lint can never substitute for a real install).
    #
    # Pin policy: two deterministic pins, bumped at every capiva release —
    # the FLOOR (strictest known validator; oldest CLI install is promised on)
    # and a RECENT version. A failure on a pin bump means the CLI's manifest
    # validator drifted upstream — the early-warning signal this job exists
    # to give, not noise. stdin is closed on every invocation: the CLI waits
    # on stdin when it inherits an interactive-looking terminal.
    name: Real plugin install (CLI ${{ matrix.cli }})
    strategy:
      fail-fast: false
      matrix:
        cli: ["2.1.50", "2.1.160"]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install pinned Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@${{ matrix.cli }}
      - name: Install the plugin exactly as the README documents
        run: |
          export CLAUDE_CONFIG_DIR="$RUNNER_TEMP/claude-config"
          claude plugin marketplace add "$GITHUB_WORKSPACE" < /dev/null
          claude plugin install capiva@capiva < /dev/null
          claude plugin list < /dev/null
          claude plugin list < /dev/null | grep -qi capiva
          echo "plugin-install: real CLI accepted the manifest and cached the plugin"

  posix-hook-exec:
    # Fires run-hook.cmd EXACTLY as Claude Code's hook runner does — by direct
    # path from hooks.json, NOT via an `sh` prefix (which the scenario tests use
    # and which masks the exec-bit question). On POSIX a non-executable,
    # shebang-less dispatcher fails before the .py runs, silently removing ALL
    # enforcement for non-Windows adopters. This job is the empirical proof the
    # dispatch works; PRD-001 committed the exec bit to make it pass.
    name: POSIX hook exec (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Dispatcher must be executable as committed
        run: test -x hooks/run-hook.cmd
      - name: Fire the guard by BARE PATH (as Claude Code does), expect a deny
        run: |
          export CLAUDE_PROJECT_DIR="$GITHUB_WORKSPACE"
          mkdir -p .board
          printf -- '- **Phase**: IDLE\n- **Quality Gate**: --\n' > .board/sprint-state.md
          OUT=$(printf '{"tool_name":"Edit","tool_input":{"file_path":"src/x.py"}}' \
            | ./hooks/run-hook.cmd phase_guard)
          echo "$OUT"
          echo "$OUT" | python -c "import json,sys; d=json.load(sys.stdin); assert d['hookSpecificOutput']['permissionDecision']=='deny'"
          test -f .state/guard-heartbeat
          echo "posix-hook-exec: guard fired by bare path AND dropped a heartbeat"

  hook-tests:
    name: Hook tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Phase guard scenario tests
        run: python hooks/tests/scenario_phase_guard.py
      - name: Plugin hook layer tests (dispatcher sh/cmd, session-context, no-op guards)
        run: python hooks/tests/scenario_plugin_hooks.py
      - name: State-machine behavioral eval (deterministic, no LLM)
        run: python hooks/tests/scenario_state_machine.py
      - name: Context-persistence entry points smoke test
        shell: bash
        run: |
          export CLAUDE_PROJECT_DIR="$GITHUB_WORKSPACE"
          mkdir -p .board
          cp project-template/.board/sprint-state.md .board/sprint-state.md
          python hooks/context-persistence.py precompact
          test -f .state/session-state.md
          python hooks/context-persistence.py restore | python -c "import json,sys; d=json.load(sys.stdin); assert d['additionalContext']"
          test ! -f .state/session-state.md
          python hooks/context-persistence.py stop
          test -f .state/session-state.md
          echo "context-persistence: precompact/restore/stop OK"
